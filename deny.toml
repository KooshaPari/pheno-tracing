# cargo-deny config for pheno-tracing
#
# Fleet-standard license allow-list (mirrors KWatch/deny.toml + BytePort/deny.toml;
# every entry is a permissive or weak-copyleft license in mainstream Rust use).
# Re-evaluate on every dep bump and on each touch of this file.
#
# Policy:
#   - Every advisory ignore below MUST carry a specific RUSTSEC ID and a
#     concrete justification (per repo policy: no silent suppressions, no
#     wildcard ignores).
#   - License additions require an inline note pointing to the upstream
#     crate that motivated the addition (the "X-License-Y" pattern).

[advisories]
version = 2
yanked = "deny"

ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSD-3-Clause-Clear",
    "CC0-1.0",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "BlueOak-1.0.0",
    "Unlicense",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# The graph highlighting used when creating dotgraphs for crates with
# multiple versions. * "all" highlights both the lowest-version and
# simplest-path; * "lowest-version" highlights just the lowest; *
# "simplest-path" highlights just the simplest path.
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
