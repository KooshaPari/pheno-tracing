# .github/workflows/deny.yml — cargo-deny only (separate job graph).
# Kept separate from audit.yml so it can run on a different schedule.

name: deny

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: deny-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deny:
    name: cargo-deny check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
      - uses: EmbarkStudios/cargo-deny-action@ef301417264190a1eb9f26fcf171642070085c5b # v1
        with:
          command: check
          arguments: --hide-inclusion-graph --workspace
