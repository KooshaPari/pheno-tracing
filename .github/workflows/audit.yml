# .github/workflows/audit.yml — RustSec advisory + cargo-deny license/bans.
# Runs weekly + on push to main. Pinned SHAs per ADR-019.

name: audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly Monday 06:00 UTC
    - cron: "0 6 * * 1"

concurrency:
  group: audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # for dependabot metadata fetch on PRs

jobs:
  rustsec:
    name: RustSec advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
      - uses: taiki-e/install-action@8b3c737da4b541bf0fb5a3e0488ff20535badac9 # v2
        with:
          tool: cargo-audit
      - run: cargo audit --deny warnings

  cargo-deny:
    name: cargo-deny (license + bans + sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: EmbarkStudios/cargo-deny-action@ef301417264190a1eb9f26fcf171642070085c5b # v1
        with:
          command: check
          arguments: --hide-inclusion-graph --workspace

  dependabot-metadata:
    name: dependabot metadata
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
