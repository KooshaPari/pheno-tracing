name: Release
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver)'
        required: true
        default: '0.3.0'

# Release runs are sequential; never cancel a release mid-flight.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo.toml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag v$VERSION != Cargo.toml $CARGO_VERSION"
            exit 1
          fi

      - name: Build + test (release)
        run: |
          cargo test --release --locked --all-features
          cargo publish --dry-run --locked --all-features

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx

      - name: Generate SBOM (CycloneDX)
        run: cargo cyclonedx --all-features --format json --override-filename target/sbom

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --all-features

      - name: Create GitHub Release + attach SBOM
        uses: softprops/action-gh-release@v2
        with:
          name: "pheno-tracing ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            target/sbom.json
            target/sbom.cdx.xml
